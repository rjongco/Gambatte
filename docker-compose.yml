services:
  db:
    image: postgres:16-alpine
    container_name: gambatte_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gambatte
      POSTGRES_PASSWORD: gambatte
      POSTGRES_DB: gambatte
    ports:
      - "5432:5432"
    volumes:
      - gambatte_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gambatte -d gambatte"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: apply Drizzle migrations, then exit. Built from the `builder`
  # stage because it still has drizzle-kit + the migration files.
  migrate:
    build:
      context: .
      target: builder
    image: ghcr.io/rjongco/gambatte-migrate:latest
    container_name: gambatte_migrate
    # Create the gambatte database if missing, then apply migrations.
    command: npm run db:setup
    environment:
      DATABASE_URL: postgres://gambatte:gambatte@db:5432/gambatte
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
    image: ghcr.io/rjongco/gambatte-app:latest
    container_name: gambatte_app
    restart: unless-stopped
    ports:
      - "7431:7431"
    environment:
      # DB lives on the compose network, not localhost.
      DATABASE_URL: postgres://gambatte:gambatte@db:5432/gambatte
      # Login gate (set both in the host .env to require a login). AUTH_SECRET
      # is optional — it signs the session cookie and defaults to the password.
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
      # Trello secrets are interpolated from the host .env at run time — they
      # are NOT baked into the image (.env is in .dockerignore) and stay
      # server-side inside the container.
      TRELLO_KEY: ${TRELLO_KEY:-}
      TRELLO_TOKEN: ${TRELLO_TOKEN:-}
      TRELLO_BOARD_ID: ${TRELLO_BOARD_ID:-}
      TRELLO_LIST_IDS: ${TRELLO_LIST_IDS:-}
      TRELLO_COMPLETED_LIST_ID: ${TRELLO_COMPLETED_LIST_ID:-}
      TRELLO_MEMBER_ID: ${TRELLO_MEMBER_ID:-}
      # Google Sheets export (server-side only). Interpolated from the host .env at
      # run time, NOT baked into the image. GOOGLE_PRIVATE_KEY stays single-line
      # with literal \n escapes (see .env.example).
      GOOGLE_SHEETS_SPREADSHEET_ID: ${GOOGLE_SHEETS_SPREADSHEET_ID:-}
      GOOGLE_SHEETS_TEMPLATE_TITLE: ${GOOGLE_SHEETS_TEMPLATE_TITLE:-Template}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL:-}
      GOOGLE_PRIVATE_KEY: ${GOOGLE_PRIVATE_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  gambatte_pgdata:
